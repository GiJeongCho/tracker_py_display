<div class="flex flex-col gap-4">

  <!-- 기록 제어 -->
  <div class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <h2 class="text-lg font-bold flex items-center gap-2"><span class="material-icons text-primary">assessment</span> 추적 세션 보고서</h2>
      <div class="flex items-center gap-2">
        <span id="rep-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
        <span id="rep-state" class="text-sm font-medium">정지</span>
        <button id="rep-start" class="px-3 py-2 bg-red-600 hover:bg-red-700 text-white rounded text-sm font-medium flex items-center gap-1">
          <span class="material-icons text-base">fiber_manual_record</span> 기록 시작</button>
        <button id="rep-stop" class="px-3 py-2 bg-gray-300 dark:bg-gray-700 rounded text-sm font-medium flex items-center gap-1" disabled>
          <span class="material-icons text-base">stop</span> 중지</button>
      </div>
    </div>
    <div id="rep-recinfo" class="text-xs text-text-light-secondary dark:text-dark-secondary mt-2">기록을 시작하면 실시간 추적 결과가 누적됩니다.</div>
  </div>

  <!-- 실시간 현황 (한글) -->
  <div class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
    <h3 class="text-base font-bold mb-2 flex items-center gap-2"><span class="material-icons text-primary">campaign</span> 실시간 현황</h3>
    <p id="rep-live" class="text-sm leading-relaxed">대기 중 — 소스를 연결하면 현재 상황이 여기에 표시됩니다.</p>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-3 text-center">
      <div class="rounded-lg border border-border-light dark:border-border-dark p-2">
        <div class="text-xs text-text-light-secondary dark:text-dark-secondary">추적 중</div>
        <div id="rep-live-tracks" class="text-xl font-bold text-primary">0</div>
      </div>
      <div class="rounded-lg border border-border-light dark:border-border-dark p-2">
        <div class="text-xs text-text-light-secondary dark:text-dark-secondary">이동 중</div>
        <div id="rep-live-moving" class="text-xl font-bold">0</div>
      </div>
      <div class="rounded-lg border border-border-light dark:border-border-dark p-2">
        <div class="text-xs text-text-light-secondary dark:text-dark-secondary">처리 FPS</div>
        <div id="rep-live-fps" class="text-xl font-bold">0</div>
      </div>
      <div class="rounded-lg border border-border-light dark:border-border-dark p-2">
        <div class="text-xs text-text-light-secondary dark:text-dark-secondary">지연(ms)</div>
        <div id="rep-live-lat" class="text-xl font-bold">0</div>
      </div>
    </div>
  </div>

  <!-- 보고서 결과 -->
  <div class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
      <h3 class="text-base font-bold flex items-center gap-2"><span class="material-icons text-primary">summarize</span> 세션 요약</h3>
      <div class="flex items-center gap-2">
        <button id="rep-refresh" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-700 rounded text-sm font-medium">↺ 새로고침</button>
        <button id="rep-csv" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">CSV</button>
        <button id="rep-json" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium">JSON</button>
      </div>
    </div>

    <!-- 개요 카드 -->
    <div id="rep-overview" class="grid grid-cols-2 md:grid-cols-4 gap-2 text-center mb-4"></div>

    <!-- 클래스별 표 -->
    <h4 class="text-sm font-bold mb-2">클래스별 통계</h4>
    <div class="rounded-lg border border-border-light dark:border-border-dark overflow-hidden mb-4">
      <table class="w-full text-sm text-center">
        <thead class="bg-gray-100 dark:bg-gray-800 text-xs font-bold">
          <tr><th class="px-2 py-2">전차 종류</th><th class="px-2 py-2">등장 수</th><th class="px-2 py-2">평균 속력</th><th class="px-2 py-2">최대 속력</th><th class="px-2 py-2">평균 크기</th></tr>
        </thead>
        <tbody id="rep-class-tbody" class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr><td colspan="5" class="py-6 text-text-light-secondary dark:text-dark-secondary">데이터 없음</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 트랙별 표 -->
    <h4 class="text-sm font-bold mb-2">객체(트랙)별 상세</h4>
    <div class="rounded-lg border border-border-light dark:border-border-dark overflow-hidden">
      <div class="max-h-[420px] overflow-y-auto custom-scrollbar">
        <table class="w-full text-sm text-center">
          <thead class="bg-gray-100 dark:bg-gray-800 text-xs font-bold sticky top-0">
            <tr><th class="px-2 py-2">ID</th><th class="px-2 py-2">종류</th><th class="px-2 py-2">지속(f)</th><th class="px-2 py-2">평균 속력</th><th class="px-2 py-2">최대 속력</th><th class="px-2 py-2">이동거리(px)</th><th class="px-2 py-2">시작→끝</th></tr>
          </thead>
          <tbody id="rep-track-tbody" class="divide-y divide-gray-200 dark:divide-gray-700">
            <tr><td colspan="7" class="py-8 text-text-light-secondary dark:text-dark-secondary">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="text-xs text-text-light-secondary dark:text-dark-secondary mt-2">속력 단위: px/s (소스 FPS 기준 환산)</div>
  </div>

</div>
