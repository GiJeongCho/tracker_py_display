<div class="flex flex-col gap-4">

  <!-- 입력 바 -->
  <div class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
    <div class="flex flex-wrap items-end gap-3">
      <div>
        <input type="file" id="dash-file" accept="video/*" class="hidden">
        <button id="dash-upload" class="px-3 py-2 bg-primary hover:bg-orange-600 text-white rounded text-sm font-medium flex items-center gap-1">
          <span class="material-icons text-base">upload</span> 파일 업로드
        </button>
      </div>
      <div class="flex-1 min-w-[220px]">
        <label class="text-xs text-text-light-secondary dark:text-dark-secondary">RTSP / HTTP / 서버경로 / 카메라(0)</label>
        <input id="dash-src" type="text" placeholder="rtsp://…  또는  0  또는  경로"
               class="w-full mt-1 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark">
      </div>
      <button id="dash-source" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">▶ 소스 적용</button>
      <button id="dash-reset" class="px-3 py-2 bg-gray-300 dark:bg-gray-700 rounded text-sm font-medium">⏹ 중지</button>
      <div class="flex items-end gap-2">
        <div>
          <label class="text-xs text-text-light-secondary dark:text-dark-secondary">탐지 모델</label>
          <select id="dash-model" class="mt-1 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark min-w-[200px]"></select>
        </div>
        <button id="dash-model-apply" class="px-3 py-2 bg-gray-300 dark:bg-gray-700 rounded text-sm font-medium">🔀 교체</button>
      </div>
    </div>
    <div id="dash-io-status" class="text-xs mt-2"></div>
  </div>

  <!-- 라이브(왼쪽, 축소) + 탐지·추적 표(오른쪽) -->
  <div class="flex flex-col xl:flex-row gap-4 items-start">
    <!-- 라이브 -->
    <div class="w-full xl:flex-1 min-w-0 bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 class="text-base font-bold flex items-center gap-2"><span class="material-icons text-primary">videocam</span> 실시간 화면</h2>
        <div class="flex items-center gap-3">
          <label class="text-xs flex items-center gap-1"><input id="trail-toggle" type="checkbox" class="w-4 h-4" checked> 이동 경로</label>
          <label class="text-xs flex items-center gap-1"><input id="compare-toggle" type="checkbox" class="w-4 h-4"> 처리 전/후</label>
        </div>
      </div>
      <div id="live-wrap" class="grid grid-cols-1 gap-3">
        <!-- 비교 시 원본(왼쪽) → 처리 후(오른쪽) 순서. 미비교 시 원본은 숨김 -->
        <div id="cell-before" class="flex-col items-center" style="display:none">
          <div class="text-sm font-semibold mb-1">처리 전 (원본)</div>
          <img id="img-before" class="live-img" alt="원본 로딩 중…">
        </div>
        <div id="cell-after" class="flex flex-col items-center w-full">
          <div id="after-title" class="text-sm font-semibold mb-1" style="display:none">처리 후</div>
          <div class="relative w-full">
            <img id="img-after" class="live-img" alt="처리 결과 로딩 중…">
            <!-- 처리 단계 선택: 영상 상단에 작게 오버레이 -->
            <div id="feed-buttons" class="feed-overlay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 실시간 추적 결과 (오른쪽): 요약 카드 + 높이제한 스크롤 상세표 -->
    <div class="w-full xl:w-[400px] flex-none bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
      <!-- 정찰 보고 (자연어) : 실시간 추적 결과 위에 표시 -->
      <div class="rounded-lg border border-primary/40 bg-primary/5 dark:bg-primary/10 overflow-hidden mb-3 p-3">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-sm font-bold flex items-center gap-1"><span class="material-icons text-primary text-base">description</span> 정찰 보고</h3>
          <span id="report-time" class="text-xs font-mono text-text-light-secondary dark:text-dark-secondary">—</span>
        </div>
        <div id="dash-report" class="text-sm leading-relaxed space-y-1">
          <p class="text-text-light-secondary dark:text-dark-secondary">표적 미식별 — 접촉 없음</p>
        </div>
      </div>

      <h2 class="text-base font-bold mb-3 flex items-center gap-2"><span class="material-icons text-primary">radar</span> 실시간 추적 결과</h2>

      <!-- 요약 카드 -->
      <div class="rounded-lg border border-border-light dark:border-border-dark overflow-hidden mb-3">
        <table class="w-full text-sm text-center">
          <tbody>
            <tr>
              <th class="px-2 py-2 bg-gray-100 dark:bg-gray-800 text-xs font-bold w-1/3">현재시각</th>
              <td id="dash-now" class="px-2 py-2 font-mono text-primary" colspan="2">—</td>
            </tr>
          </tbody>
        </table>
        <table class="w-full text-sm text-center border-t border-border-light dark:border-border-dark">
          <thead class="bg-gray-100 dark:bg-gray-800 text-xs font-bold">
            <tr><th class="px-2 py-2">전차 크기</th><th class="px-2 py-2">전차 종류</th><th class="px-2 py-2">전차 수</th></tr>
          </thead>
          <tbody id="dash-summary" class="divide-y divide-gray-200 dark:divide-gray-700">
            <tr><td colspan="3" class="py-4 text-text-light-secondary dark:text-dark-secondary">추적된 객체 없음</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 상세표 (높이 제한 + 스크롤, 헤더 고정) -->
      <div class="rounded-lg border border-border-light dark:border-border-dark overflow-hidden">
        <div class="max-h-[360px] overflow-y-auto custom-scrollbar">
          <table class="w-full text-sm text-center">
            <thead class="bg-gray-100 dark:bg-gray-800 text-xs font-bold sticky top-0">
              <tr><th class="px-2 py-2">추적 ID</th><th class="px-2 py-2">전차 종류</th><th class="px-2 py-2">좌표</th><th class="px-2 py-2">속도(px/f)</th></tr>
            </thead>
            <tbody id="dash-tbody" class="divide-y divide-gray-200 dark:divide-gray-700">
              <tr><td colspan="4" class="py-8 text-text-light-secondary dark:text-dark-secondary">추적된 객체 없음</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 전처리 제어 -->
  <div class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark p-4">
    <h2 class="text-lg font-bold mb-3 flex items-center gap-2"><span class="material-icons text-primary">auto_fix_high</span> 전처리 제어</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
      <label class="flex items-center justify-between gap-2 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark px-3 py-2">
        <span class="text-sm">🌫️ 안개 제거</span><input id="pp-fog" type="checkbox" class="w-4 h-4"></label>
      <label class="flex items-center justify-between gap-2 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark px-3 py-2">
        <span class="text-sm">🌙 저조도/야간</span><input id="pp-dark" type="checkbox" class="w-4 h-4"></label>
      <label class="flex items-center justify-between gap-2 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark px-3 py-2">
        <span class="text-sm">🎚️ 화질향상</span><input id="pp-stage2" type="checkbox" class="w-4 h-4"></label>
      <label class="flex items-center justify-between gap-2 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark px-3 py-2">
        <span class="text-sm">🔎 표적강조</span><input id="pp-stage3" type="checkbox" class="w-4 h-4"></label>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
      <div>
        <label class="text-xs font-medium">Stage1 모드</label>
        <select id="pp-mode" class="w-full mt-1 mb-2 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark">
          <option value="auto">auto (밝기 자동)</option><option value="fog">fog (항상 안개)</option>
          <option value="dark">dark (항상 저조도)</option><option value="none">none (끔)</option>
        </select>
        <label class="text-xs font-medium">안개 제거 알고리즘</label>
        <select id="pp-falgo" class="w-full mt-1 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark"></select>
        <div class="ctl-slider mt-2" data-key="dark_gain" data-min="0.1" data-max="3" data-step="0.05"></div>
      </div>
      <div>
        <label class="text-xs font-medium">화질향상 알고리즘</label>
        <select id="pp-qalgo" class="w-full mt-1 mb-2 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark"></select>
        <label class="text-xs font-medium">표적강조 알고리즘</label>
        <select id="pp-ealgo" class="w-full mt-1 px-2 py-1.5 text-sm rounded border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark"></select>
      </div>
    </div>
    <div class="flex gap-3 mt-4">
      <button id="pp-apply" class="flex-1 px-4 py-2 bg-primary hover:bg-orange-600 text-white rounded font-medium">✅ 전처리 적용</button>
      <button id="pp-reload" class="flex-1 px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded font-medium">↺ 현재값</button>
    </div>
    <div id="pp-status" class="text-xs mt-2"></div>
  </div>

</div>
